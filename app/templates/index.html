<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IDS Console</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='scripts/theme.css') }}" />
    <script>
      window.__INITIAL_DATA__ = {
        reports: {{ reports | tojson }},
        alerts: {{ alerts | tojson }},
        whitelist: {{ whitelist | tojson }}
      };
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- 1. React first -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

    <!-- 2. Your scripts after -->
    <script src="{{ url_for('static', filename='scripts/data.js') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='scripts/charts.jsx') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='scripts/app.jsx') }}"></script>
  </body>
</html>
